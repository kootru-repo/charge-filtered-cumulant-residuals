name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  primary:
    # Primary gate: Linux + Python 3.12.
    name: linux-3.12-full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run pytest with coverage
        # MANIFEST.json is committed at deposit time; the integrity test
        # hashes data/ against it. We intentionally do NOT regenerate the
        # manifest in CI -- doing so would make the data-integrity test
        # tautological (hash today's files against today's manifest).
        run: pytest --cov=connected_layer_sector --cov-report=term-missing -q

  compatibility:
    # Smoke matrix: unit tests only (no notebook execution); narrower than
    # the full pipeline but confirms the package imports and tests pass.
    name: ${{ matrix.os }}-${{ matrix.python-version }}-units
    runs-on: ${{ matrix.os }}
    needs: primary
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install package + dev extras
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run unit tests (no notebooks)
        # Same reasoning as primary: do not regenerate manifest in CI.
        run: pytest -q --ignore=tests/test_smoke_regeneration.py
