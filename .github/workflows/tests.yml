name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  primary:
    # Primary gate: Linux + Python 3.12.
    name: linux-3.12-full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.12 via uv
        run: uv python install 3.12
      - name: Install package + dev extras
        run: uv sync --python 3.12 --extra dev
      - name: Run pytest with coverage
        # MANIFEST.json is committed at deposit time; the integrity test
        # hashes data/ against it. We intentionally do NOT regenerate the
        # manifest in CI -- doing so would make the data-integrity test
        # tautological (hash today's files against today's manifest).
        run: uv run pytest --cov=connected_layer_sector --cov-report=term-missing -q

  compatibility:
    # Smoke matrix: unit tests only (no notebook execution); narrower than
    # the full pipeline but confirms the package imports and tests pass.
    name: ${{ matrix.os }}-${{ matrix.python-version }}-units
    runs-on: ${{ matrix.os }}
    needs: primary
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }} via uv
        run: uv python install ${{ matrix.python-version }}
      - name: Install package + dev extras
        run: uv sync --python ${{ matrix.python-version }} --extra dev
      - name: Run unit tests (no notebooks)
        # Same reasoning as primary: do not regenerate manifest in CI.
        run: uv run pytest -q --ignore=tests/test_smoke_regeneration.py
