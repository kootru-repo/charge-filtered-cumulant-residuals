name: notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: notebooks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  execute:
    # Linux + Python 3.12, matching Binder. Runs every notebook end-to-end
    # via nbval-lax so float-output drift doesn't break CI; relies on
    # explicit `assert` cells inside notebooks for scientific verification.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install package + notebook extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,notebooks]"
      - name: Generate manifest
        run: cls-manifest
      - name: Execute notebooks (lax output comparison)
        run: pytest --nbval-lax notebooks/ -q
