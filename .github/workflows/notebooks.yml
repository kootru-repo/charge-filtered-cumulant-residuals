name: notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: notebooks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  execute:
    # Linux + Python 3.12. Runs every notebook end-to-end via nbval-lax
    # so float-output drift doesn't break CI; relies on explicit `assert`
    # cells inside notebooks for scientific verification.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python 3.12 via uv
        run: uv python install 3.12
      - name: Install package + notebook extras
        run: uv sync --python 3.12 --extra dev --extra notebooks
      - name: Execute notebooks (lax output comparison)
        # MANIFEST.json is committed; do NOT regenerate in CI.
        run: uv run pytest --nbval-lax notebooks/ -q
