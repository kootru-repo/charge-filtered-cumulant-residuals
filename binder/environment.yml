name: connected-layer-sector
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy>=1.26
  - scipy>=1.11
  - matplotlib>=3.8
  - jupyterlab>=4.0
  - ipywidgets>=8.0
  - pip
  - pip:
      # Install the local package (this repo) in editable mode so notebooks
      # can `import connected_layer_sector`. Runtime deps (numpy, scipy)
      # are already conda-installed above, so pip sees them satisfied.
      - -e .
