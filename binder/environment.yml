name: connected-layer-sector
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy>=1.26
  - scipy>=1.11
  - matplotlib>=3.8
  - jupyterlab>=4.0
  - ipywidgets>=8.0
  - pip
  - pip:
      # Install the local package (this repo) in editable mode so notebooks
      # can `import connected_layer_sector`. The `--no-deps` flag avoids
      # re-resolving against pip what conda has already installed.
      - --no-deps
      - -e .
